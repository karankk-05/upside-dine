<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Upside Dine</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="login-container">
            <!-- Logo -->
            <img src="logo.png" alt="Upside Dine" class="login-logo">

            <!-- Title -->
            <h1 class="login-title neon-text-prominent">Welcome Back</h1>
            <p class="login-subtitle">Choose your role and sign in</p>

            <!-- Role Selector -->
            <div class="role-selector">
                <button class="role-btn active">Student</button>
                <button class="role-btn">Admin</button>
            </div>

            <!-- Login Form -->
            <form>
                <div class="input-group">
                    <label class="input-label">Email or Student ID</label>
                    <input type="text" class="input-field" placeholder="Enter your email or ID">
                </div>

                <div class="input-group">
                    <label class="input-label">Password</label>
                    <input type="password" class="input-field" placeholder="Enter your password">
                </div>

                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-primary">
                    SIGN IN
                </button>
            </form>

            <p style="text-align: center; margin-top: 32px; color: var(--st-text-dim); font-size: 13px;">
                Don't have an account? <a href="#"
                    style="color: var(--st-accent); text-decoration: none; font-weight: 600;">Register</a>
            </p>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        let selectedRole = 'student';

        // Role toggle functionality
        const roleBtns = document.querySelectorAll('.role-btn');
        roleBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                roleBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedRole = btn.textContent.toLowerCase();
            });
        });

        // Form submission
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const email = form.querySelector('input[type="text"]').value.trim();
            const password = form.querySelector('input[type="password"]').value.trim();

            // Validation
            if (!email || !password) {
                UI.showError('Please fill in all fields');
                return;
            }

            // Mock authentication - accept any credentials
            AppState.login(email, selectedRole);

            // Redirect based on role
            if (selectedRole === 'student') {
                Navigation.goTo('dashboard.html');
            } else {
                Navigation.goTo('admin-mess-manager.html');
            }
        });
    </script>
</body>

</html>
