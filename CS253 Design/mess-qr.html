<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your QR Code - Upside Dine</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="dashboard">
            <!-- Page Header -->
            <div class="page-header">
                <div class="back-btn">←</div>
                <h1 class="page-title neon-text-subtle">Your QR Code</h1>
            </div>

            <!-- QR Code Display -->
            <div class="qr-container">
                <div class="qr-card">
                    <h2 style="font-size: 18px; margin-bottom: 8px;">Booking Confirmed!</h2>
                    <p style="color: var(--st-text-dim); font-size: 13px; margin-bottom: 24px;">
                        Show this QR code to the mess worker
                    </p>

                    <div class="qr-code">
                        <svg width="200" height="200" viewBox="0 0 200 200" style="display: block;">
                            <!-- Simple QR Code representation -->
                            <rect width="200" height="200" fill="white" />
                            <g fill="black">
                                <!-- Top-left finder pattern -->
                                <rect x="10" y="10" width="60" height="60" />
                                <rect x="20" y="20" width="40" height="40" fill="white" />
                                <rect x="30" y="30" width="20" height="20" fill="black" />

                                <!-- Top-right finder pattern -->
                                <rect x="130" y="10" width="60" height="60" />
                                <rect x="140" y="20" width="40" height="40" fill="white" />
                                <rect x="150" y="30" width="20" height="20" fill="black" />

                                <!-- Bottom-left finder pattern -->
                                <rect x="10" y="130" width="60" height="60" />
                                <rect x="20" y="140" width="40" height="40" fill="white" />
                                <rect x="30" y="150" width="20" height="20" fill="black" />

                                <!-- Random data modules -->
                                <rect x="80" y="10" width="10" height="10" />
                                <rect x="100" y="10" width="10" height="10" />
                                <rect x="80" y="30" width="10" height="10" />
                                <rect x="90" y="40" width="10" height="10" />
                                <rect x="110" y="50" width="10" height="10" />
                                <rect x="10" y="80" width="10" height="10" />
                                <rect x="30" y="80" width="10" height="10" />
                                <rect x="50" y="90" width="10" height="10" />
                                <rect x="80" y="80" width="10" height="10" />
                                <rect x="100" y="90" width="10" height="10" />
                                <rect x="130" y="80" width="10" height="10" />
                                <rect x="150" y="90" width="10" height="10" />
                                <rect x="170" y="80" width="10" height="10" />
                                <rect x="80" y="130" width="10" height="10" />
                                <rect x="100" y="140" width="10" height="10" />
                                <rect x="120" y="150" width="10" height="10" />
                            </g>
                        </svg>
                    </div>

                    <div class="qr-info">
                        <p style="font-size: 15px; font-weight: 600; margin-bottom: 4px;">Paneer Butter Masala</p>
                        <p style="font-size: 13px; color: var(--st-text-dim);">Booking ID: #MB20240048</p>
                    </div>

                    <div class="qr-validity">
                        Valid for
                    </div>
                    <div class="qr-timer">02:45:30</div>

                    <div
                        style="margin-top: 24px; padding: 16px; background: rgba(255, 0, 0, 0.1); border: 1px solid var(--st-accent); border-radius: 12px;">
                        <p style="font-size: 12px; color: var(--st-text-dim); line-height: 1.5;">
                            <strong style="color: var(--st-accent);">Amount:</strong> ₹40 (Added to monthly account)<br>
                            <strong style="color: var(--st-accent);">Expires:</strong> Today at 8:00 PM
                        </p>
                    </div>
                </div>

                <button class="btn-primary" style="margin-top: 24px;">
                    Download QR Code
                </button>
            </div>

            <!-- Bottom Navigation -->
            <nav class="bottom-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    Home
                </a>
                <a href="#" class="nav-item active">
                    <span class="nav-icon">📦</span>
                    Orders
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">❤️</span>
                    Favorites
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">👤</span>
                    Profile
                </a>
            </nav>
        </div>
    </div>

    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <script src="app.js"></script>
    <script>
        Navigation.requireRole('student');

        // Get current booking
        const bookingId = localStorage.getItem('current_booking');
        const booking = AppState.bookings.find(b => b.id === bookingId);

        if (!booking) {
            UI.showError('No booking found');
            Navigation.goTo('dashboard.html');
        } else {
            // Generate QR code
            const qrData = Utils.generateQRData(booking);
            const canvas = document.createElement('canvas');
            const qr = new QRious({
                element: canvas,
                value: qrData,
                size: 200
            });

            // Replace SVG with generated QR code
            const qrCodeDiv = document.querySelector('.qr-code');
            qrCodeDiv.innerHTML = '';
            qrCodeDiv.appendChild(canvas);

            // Update booking info
            const item = booking.items[0];
            document.querySelector('.qr-info p:first-child').textContent = item.name;
            document.querySelector('.qr-info p:last-child').textContent = `Booking ID: #${booking.id}`;

            // Update amount
            document.querySelector('.qr-card > div:last-of-type p').innerHTML =
                `<strong style="color: var(--st-accent);">Amount:</strong> ₹${item.price} (Added to monthly account)<br>
                <strong style="color: var(--st-accent);">Expires:</strong> Today at 8:00 PM`;

            // Countdown timer (3 hours = 10800 seconds)
            let seconds = 10800;
            const timerEl = document.querySelector('.qr-timer');
            setInterval(() => {
                seconds--;
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                timerEl.textContent = `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }, 1000);
        }

        // Back button
        document.querySelector('.back-btn').addEventListener('click', () => {
            Navigation.goTo('dashboard.html');
        });

        // Download button
        document.querySelector('.btn-primary').addEventListener('click', () => {
            const canvas = document.querySelector('.qr-code canvas');
            const url = canvas.toDataURL();
            const link = document.createElement('a');
            link.download = `mess-booking-${booking.id}.png`;
            link.href = url;
            link.click();
        });
    </script>
</body>

</html>
