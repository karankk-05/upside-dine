<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upside Dine - Splash</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="splash-screen">
      <!-- Particle Effects -->
      <div class="particles">
        <div class="particle" style="left: 10%; animation-delay: 0s;"></div>
        <div class="particle" style="left: 25%; animation-delay: 2s;"></div>
        <div class="particle" style="left: 40%; animation-delay: 4s;"></div>
        <div class="particle" style="left: 55%; animation-delay: 1s;"></div>
        <div class="particle" style="left: 70%; animation-delay: 3s;"></div>
        <div class="particle" style="left: 85%; animation-delay: 5s;"></div>
      </div>
      
      <!-- Logo -->
      <img src="logo.png" alt="Upside Dine" class="splash-logo">
      
      <!-- Loading Indicator -->
      <div style="margin-top: 60px;">
        <div class="loading"></div>
      </div>
    </div>
  </div>
  
  <script src="app.js"></script>
  <script>
    // Auto redirect to login after 2 seconds
    setTimeout(() => {
      document.querySelector('.splash-screen').style.opacity = '0';
      setTimeout(() => {
        Navigation.goTo('login.html');
      }, 500);
    }, 2000);
  </script>
</body>
</html>
