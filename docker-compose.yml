

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: upside_dine_db
    environment:
      POSTGRES_DB: upside_dine_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: upside_dine_redis
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upside_dine_backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_data &&
             python manage.py collectstatic --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    # ports:
    #   - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upside_dine_celery_worker
    command: celery -A config worker -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - backend

  # Celery Beat Scheduler
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upside_dine_celery_beat
    command: celery -A config beat -l info
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - backend

  # Django Channels (WebSocket)
  channels:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: upside_dine_channels
    command: daphne -b 0.0.0.0 -p 8001 config.asgi:application
    volumes:
      - ./backend:/app
    # ports:
    #   - "8001:8001"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis

  # ML Crowd Monitoring Service (FastAPI + YOLOv8)
  ml_service:
    build:
      context: ./ml_service
      dockerfile: Dockerfile
    container_name: upside_dine_ml
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    volumes:
      - ./ml_service:/app
    # ports:
    #   - "8002:8002"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POLL_INTERVAL_SECONDS=30
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/ml/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: upside_dine_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # ports:
    #   - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    stdin_open: true
    tty: true

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: upside_dine_nginx
    ports:
      - "48080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/static
      - media_volume:/media
    depends_on:
      - backend
      - frontend

  adminer:
    image: adminer
    container_name: upside_dine_adminer
    restart: always
    ports:
      - "127.0.0.1:9090:8080"
    depends_on:
      - db

volumes:
  postgres_data:
  static_volume:
  media_volume:
