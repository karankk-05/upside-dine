<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0f0a0a"/><stop offset="100%" stop-color="#1a1010"/></linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="900" height="620" fill="url(#bg)" rx="12"/>

  <!-- Docker Compose Boundary -->
  <rect x="30" y="15" width="840" height="470" rx="10" fill="none" stroke="#c41e1e" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <text x="50" y="38" fill="#c41e1e" font-size="11" font-weight="600" opacity="0.8">DOCKER COMPOSE  --  9 CONTAINERS</text>

  <!-- Layer Labels -->
  <text x="50" y="72" fill="#888" font-size="10" letter-spacing="1.5">LAYER 1  /  CLIENT</text>
  <!-- React PWA -->
  <rect x="200" y="55" width="500" height="50" rx="6" fill="#1a2332" stroke="#4a9eff" stroke-width="1.2"/>
  <text x="450" y="77" fill="#4a9eff" font-size="13" font-weight="600" text-anchor="middle">React 18 PWA</text>
  <text x="450" y="93" fill="#7aa8d4" font-size="9.5" text-anchor="middle">Vite  /  TailwindCSS  /  Zustand  /  React Query  /  Capacitor</text>
  <text x="710" y="80" fill="#4a9eff" font-size="9" font-weight="600">:3000</text>

  <!-- Layer 2 -->
  <text x="50" y="132" fill="#888" font-size="10" letter-spacing="1.5">LAYER 2  /  GATEWAY</text>
  <rect x="130" y="115" width="640" height="45" rx="6" fill="#2a2018" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="450" y="138" fill="#f59e0b" font-size="13" font-weight="600" text-anchor="middle">Nginx Reverse Proxy</text>
  <text x="450" y="152" fill="#c4a46a" font-size="9" text-anchor="middle">/  -->  Frontend      /api/  -->  Django      /ws/  -->  Daphne      /static/  -->  Volume</text>
  <text x="780" y="140" fill="#f59e0b" font-size="9" font-weight="600">:80</text>

  <!-- Layer 3 -->
  <text x="50" y="192" fill="#888" font-size="10" letter-spacing="1.5">LAYER 3  /  APPLICATION</text>
  <g>
    <rect x="100" y="200" width="220" height="70" rx="6" fill="#2a1515" stroke="#e74c3c" stroke-width="1.2"/>
    <text x="210" y="225" fill="#e74c3c" font-size="12.5" font-weight="600" text-anchor="middle">Django REST API</text>
    <text x="210" y="241" fill="#c47a7a" font-size="8.5" text-anchor="middle">Users / Mess / Canteen / Orders</text>
    <text x="210" y="255" fill="#c47a7a" font-size="8.5" text-anchor="middle">Payments / Crowd / JWT / RBAC</text>
    <text x="325" y="220" fill="#e74c3c" font-size="8.5" font-weight="600">:8000</text>
  </g>
  <g>
    <rect x="340" y="200" width="220" height="70" rx="6" fill="#2a1515" stroke="#e74c3c" stroke-width="1.2"/>
    <text x="450" y="225" fill="#e74c3c" font-size="12.5" font-weight="600" text-anchor="middle">Daphne ASGI</text>
    <text x="450" y="243" fill="#c47a7a" font-size="8.5" text-anchor="middle">Django Channels / WebSocket Server</text>
    <text x="565" y="220" fill="#e74c3c" font-size="8.5" font-weight="600">:8001</text>
  </g>
  <g>
    <rect x="580" y="200" width="220" height="70" rx="6" fill="#2a1515" stroke="#e74c3c" stroke-width="1.2"/>
    <text x="690" y="225" fill="#e74c3c" font-size="12.5" font-weight="600" text-anchor="middle">FastAPI + YOLOv8</text>
    <text x="690" y="243" fill="#c47a7a" font-size="8.5" text-anchor="middle">Crowd Detection / Camera Feed Polling</text>
    <text x="805" y="220" fill="#e74c3c" font-size="8.5" font-weight="600">:8002</text>
  </g>

  <!-- Layer 4 -->
  <text x="50" y="305" fill="#888" font-size="10" letter-spacing="1.5">LAYER 4  /  BACKGROUND</text>
  <rect x="200" y="315" width="220" height="55" rx="6" fill="#152a1a" stroke="#34d399" stroke-width="1.2"/>
  <text x="310" y="340" fill="#34d399" font-size="12.5" font-weight="600" text-anchor="middle">Celery Worker</text>
  <text x="310" y="356" fill="#7ac4a0" font-size="9" text-anchor="middle">Async Task Queue</text>

  <rect x="480" y="315" width="220" height="55" rx="6" fill="#152a1a" stroke="#34d399" stroke-width="1.2"/>
  <text x="590" y="340" fill="#34d399" font-size="12.5" font-weight="600" text-anchor="middle">Celery Beat</text>
  <text x="590" y="356" fill="#7ac4a0" font-size="9" text-anchor="middle">Booking Expiry / Inventory Reset</text>

  <!-- Layer 5 -->
  <text x="50" y="405" fill="#888" font-size="10" letter-spacing="1.5">LAYER 5  /  DATA</text>
  <rect x="200" y="415" width="220" height="55" rx="6" fill="#1f1a2e" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="310" y="440" fill="#a78bfa" font-size="12.5" font-weight="600" text-anchor="middle">PostgreSQL 14</text>
  <text x="310" y="456" fill="#9a8abf" font-size="9" text-anchor="middle">Primary Database</text>

  <rect x="480" y="415" width="220" height="55" rx="6" fill="#1f1a2e" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="590" y="440" fill="#a78bfa" font-size="12.5" font-weight="600" text-anchor="middle">Redis 7</text>
  <text x="590" y="456" fill="#9a8abf" font-size="9" text-anchor="middle">Cache / Broker / Pub-Sub</text>

  <!-- External APIs -->
  <rect x="30" y="500" width="840" height="105" rx="10" fill="none" stroke="#fb923c" stroke-width="1.2" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="50" y="522" fill="#fb923c" font-size="10" font-weight="600" opacity="0.7" letter-spacing="1.5">EXTERNAL SERVICES</text>

  <rect x="80" y="535" width="220" height="55" rx="6" fill="#2a1f10" stroke="#fb923c" stroke-width="1.2"/>
  <text x="190" y="558" fill="#fb923c" font-size="12.5" font-weight="600" text-anchor="middle">Razorpay</text>
  <text x="190" y="575" fill="#c4996a" font-size="9" text-anchor="middle">Payments / Webhooks / UPI / Refunds</text>

  <rect x="340" y="535" width="220" height="55" rx="6" fill="#2a1f10" stroke="#fb923c" stroke-width="1.2"/>
  <text x="450" y="558" fill="#fb923c" font-size="12.5" font-weight="600" text-anchor="middle">Brevo SMTP</text>
  <text x="450" y="575" fill="#c4996a" font-size="9" text-anchor="middle">OTP Email Delivery</text>

  <rect x="600" y="535" width="220" height="55" rx="6" fill="#2a1f10" stroke="#fb923c" stroke-width="1.2"/>
  <text x="710" y="558" fill="#fb923c" font-size="12.5" font-weight="600" text-anchor="middle">IP Cameras</text>
  <text x="710" y="575" fill="#c4996a" font-size="9" text-anchor="middle">RTSP / HTTP Feeds</text>

  <!-- Connection Lines -->
  <line x1="450" y1="105" x2="450" y2="115" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="450" y1="160" x2="210" y2="200" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="450" y1="160" x2="450" y2="200" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="450" y1="160" x2="690" y2="200" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="210" y1="270" x2="310" y2="315" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="210" y1="270" x2="590" y2="315" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="310" y1="370" x2="310" y2="415" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="310" y1="370" x2="590" y2="415" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="590" y1="370" x2="590" y2="415" stroke="#666" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="210" y1="270" x2="310" y2="415" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="690" y1="270" x2="590" y2="415" stroke="#555" stroke-width="0.8" stroke-dasharray="3,2"/>
</svg>
