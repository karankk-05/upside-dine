[build]
  base = "frontend/"
  command = "npm run build"
  publish = "dist"

# Proxy API calls to Render backend (IITK server is campus-only, can't proxy from Netlify)
[[redirects]]
  from = "/api/*"
  to = "https://upside-dine-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA client-side routing — serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
