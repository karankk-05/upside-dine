[build]
  base = "frontend/"
  command = "npm run build"
  publish = "dist"

# Proxy API calls to Render backend
# Phase 1: Direct to Render (no load balancer yet)
# Phase 2: Change target to http://<iitk-ip>/api/:splat when IITK LB is ready
[[redirects]]
  from = "/api/*"
  to = "https://upside-dine-api.onrender.com/api/:splat"
  status = 200
  force = true

# SPA client-side routing — serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
