[build]
  base = "frontend/"
  command = "npm run build"
  publish = "dist"

# Proxy API calls through IITK Nginx Load Balancer
# The LB round-robins to both Render instances
[[redirects]]
  from = "/api/*"
  to = "http://172.27.16.252/api/:splat"
  status = 200
  force = true

# SPA client-side routing — serve index.html for all non-file routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
