events {
    worker_connections 1024;
}

http {
    # Load balance between two Render backend instances
    upstream api_backends {
        # Round-robin load balancing (default)
        server upside-dine-api.onrender.com:443;
        server upside-dine-api-2.onrender.com:443;
    }

    upstream channels {
        server channels:8001;
    }

    server {
        listen 80;
        server_name csehn6.cse.iitk.ac.in 172.27.16.252;

        client_max_body_size 100M;

        # API requests → Load balanced to both Render instances
        location /api/ {
            proxy_pass https://api_backends;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_ssl_server_name on;
        }

        # Django Admin → Load balanced too
        location /admin/ {
            proxy_pass https://api_backends;
            proxy_set_header Host $proxy_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_ssl_server_name on;
        }

        # WebSocket → Local Channels container
        location /ws/ {
            proxy_pass http://channels;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ML Health check → Local ML service
        location /ml/ {
            proxy_pass http://ml_service:8002;
            proxy_set_header Host $host;
        }

        # Static/Media files served by backends via WhiteNoise
        location /static/ {
            proxy_pass https://api_backends;
            proxy_set_header Host $proxy_host;
            proxy_ssl_server_name on;
        }
    }
}
