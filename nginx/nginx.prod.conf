events {
    worker_connections 1024;
}

http {
    # Primary: local IITK backend
    # Fallback: Render instances (for overflow or if local is down)
    upstream api_backends {
        server backend:8000;  # IITK local — primary
        server upside-dine-api.onrender.com:443 backup;
        server upside-dine-api-2.onrender.com:443 backup;
    }

    upstream channels {
        server channels:8001;
    }

    server {
        listen 80;
        server_name csehn6.cse.iitk.ac.in 172.27.16.252;

        client_max_body_size 100M;

        # API requests → local backend first, Render as backup
        location /api/ {
            proxy_pass http://api_backends;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;
        }

        # Django Admin → local backend
        location /admin/ {
            proxy_pass http://api_backends;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # WebSocket → Local Channels container
        location /ws/ {
            proxy_pass http://channels;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ML Health check → Local ML service
        location /ml/ {
            proxy_pass http://ml_service:8002;
            proxy_set_header Host $host;
        }

        # Static files → local backend (WhiteNoise)
        location /static/ {
            proxy_pass http://api_backends;
            proxy_set_header Host $host;
        }
    }
}
