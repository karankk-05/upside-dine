services:
  - type: web
    name: upside-dine-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: "sh -c 'python manage.py migrate && python manage.py collectstatic --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000'"
    healthCheckPath: /api/health/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ENVIRONMENT
        value: production
      - key: ALLOWED_HOSTS
        value: upside-dine-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false  # Set manually after Netlify deploys
      - key: DATABASE_NAME
        value: postgres
      - key: DATABASE_USER
        value: postgres.lbtonocpbfdpxfbbpxuj
      - key: DATABASE_PASSWORD
        sync: false  # Set manually (contains special chars)
      - key: DATABASE_HOST
        value: aws-1-ap-northeast-1.pooler.supabase.com
      - key: DATABASE_PORT
        value: "5432"
      - key: REDIS_URL
        sync: false  # Set manually
      - key: CELERY_BROKER_URL
        sync: false
      - key: CELERY_RESULT_BACKEND
        sync: false
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: EMAIL_HOST
        value: smtp-relay.brevo.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        value: "Upside Dine <upsidedine9@gmail.com>"
      - key: JWT_ACCESS_TOKEN_LIFETIME
        value: "30"
      - key: JWT_REFRESH_TOKEN_LIFETIME
        value: "7"
      - key: SECURE_SSL_REDIRECT
        value: "False"
